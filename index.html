<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autoevaluación — varios ejes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --bg:#F2F7F6;
  --surface:#FFFFFF;
  --ink:#16302C;
  --muted:#5C716C;
  --turquoise:#12A19E;
  --turquoise-soft:#D9F0EE;
  --lime:#AFC62A;
  --lime-soft:#EFF4D2;
  --alert:#B8492F;
  --alert-soft:#F5DED4;
  --line:#DCE6E4;
  --font-display:'Fraunces', Georgia, 'Times New Roman', serif;
  --font-body:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono:'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:linear-gradient(160deg, #D6EEE7 0%, #E4F0E8 45%, #EDF0D9 100%);background-attachment:fixed;color:var(--ink);font-family:var(--font-body);font-size:18px;line-height:1.5;min-height:100vh;display:flex;justify-content:center;padding:28px 16px 60px;}
.app-shell{width:100%;max-width:620px;}

.progress-wrap{margin-bottom:22px;}
.progress-track{height:6px;background:var(--line);border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;background:var(--turquoise);transition:width .25s ease;}
.progress-fill.alert{background:var(--alert);}
.progress-labels{display:flex;justify-content:space-between;margin-top:7px;font-family:var(--font-mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}

.eyebrow-pill{display:inline-block;font-family:var(--font-mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;color:#fff;padding:6px 13px;border-radius:999px;margin:0 0 14px;}
.sub-eyebrow{font-size:13px;color:var(--muted);margin:0 0 18px;}

.card{background:var(--surface);border-radius:20px;padding:34px 30px;box-shadow:0 2px 6px rgba(22,48,42,.09), 0 16px 38px rgba(22,48,42,.12);border:1px solid var(--line);}
.card.tone-calm{border-left:5px solid var(--turquoise);}
.card.tone-alert{background:var(--alert-soft);border-color:var(--alert);}
.card.tone-lime{background:var(--lime-soft);border-color:var(--lime);}

h1{font-family:var(--font-display);font-weight:700;font-size:clamp(27px,6vw,36px);line-height:1.15;margin:0 0 14px;letter-spacing:-.01em;}
h2{font-family:var(--font-display);font-weight:600;font-size:clamp(21px,5vw,27px);line-height:1.22;margin:0 0 14px;}
h3{font-family:var(--font-display);font-weight:600;font-size:19px;margin:0 0 6px;}
p{margin:0 0 16px;color:var(--ink);}
.muted{color:var(--muted);font-size:15px;}
.lead{font-size:19px;color:var(--muted);}

.btn{font-family:var(--font-body);font-weight:600;font-size:17px;border-radius:14px;padding:16px 22px;min-height:56px;border:2px solid var(--ink);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;text-align:center;transition:transform .08s ease, background .15s ease;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--ink);color:#fff;}
.btn-primary:hover{background:#0F221D;}
.btn-outline{background:transparent;color:var(--ink);}
.btn-outline:hover{background:rgba(22,48,42,.06);}
.btn-ghost{border:none;background:none;color:var(--muted);font-weight:500;font-size:15px;min-height:auto;padding:8px 4px;width:auto;text-decoration:underline;}
.btn-alert{border-color:var(--alert);color:var(--alert);background:transparent;}
.btn-alert:hover{background:var(--alert-soft);}

.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px;}
.btn-row .btn{flex:1 1 140px;}
.stack{display:flex;flex-direction:column;gap:12px;margin-top:22px;}

button:focus-visible, input:focus-visible{outline:3px solid var(--ink);outline-offset:2px;}

.dots{display:flex;gap:7px;margin-top:26px;justify-content:center;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.filled{background:var(--turquoise);}
.dot.current{background:var(--ink);}

.safety-box{background:var(--alert-soft);border-left:4px solid var(--alert);border-radius:8px;padding:18px;margin:18px 0;}
.safety-box p{margin:0 0 8px;font-size:16px;}
.safety-box p:last-child{margin-bottom:0;}
.safety-box strong{color:var(--alert);}
.persistent-safety{font-size:14px;color:var(--alert);background:var(--alert-soft);border-radius:10px;padding:10px 14px;margin-bottom:18px;font-weight:600;}

.timer-display{font-family:var(--font-mono);font-size:54px;font-weight:600;text-align:center;margin:22px 0;letter-spacing:.02em;}

input[type="number"], input[type="email"], input[type="tel"]{width:100%;font-family:var(--font-body);font-size:20px;padding:14px 16px;border-radius:12px;border:2px solid var(--line);background:#fff;color:var(--ink);}
input[type="number"]:focus, input[type="email"]:focus, input[type="tel"]:focus{border-color:var(--turquoise);}
label{display:block;font-weight:600;font-size:15px;margin-bottom:8px;}

table{width:100%;border-collapse:collapse;margin:18px 0;font-family:var(--font-mono);font-size:15px;}
th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);}
th{color:var(--muted);font-weight:600;text-transform:uppercase;font-size:12px;letter-spacing:.05em;}
td.flag-high{color:var(--alert);font-weight:600;}

.tool-list{list-style:none;padding:0;margin:0 0 8px;display:flex;flex-direction:column;gap:12px;}
.tool-list li{padding:14px 16px;background:var(--bg);border-radius:12px;border:1px solid var(--line);}
.tool-list strong{display:block;margin-bottom:2px;}
.tool-list span.caveat{display:block;margin-top:6px;font-size:14px;color:var(--muted);font-style:italic;}

.def-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:14px;}
.def-list li{padding:0;}
.def-list strong{display:block;margin-bottom:3px;font-family:var(--font-display);font-size:17px;}

.disclaimer{font-size:14px;color:var(--muted);border-top:1px solid var(--line);margin-top:24px;padding-top:18px;}
.footer-note{text-align:center;font-size:13px;color:var(--muted);margin-top:22px;font-family:var(--font-mono);}

.note-box{background:var(--turquoise-soft);border:1px solid var(--turquoise);border-radius:14px;padding:18px 20px;margin:20px 0;}
.note-box p{margin:0;}
.insight-box{background:var(--lime-soft);border:1px solid var(--lime);border-radius:14px;padding:18px 20px;margin:20px 0;}
.insight-box p{margin:0;}
.confirm-box{background:var(--lime-soft);border-radius:12px;padding:16px 18px;margin-top:14px;font-size:15px;border:1px solid var(--lime);}
.confirm-box .fineprint{display:block;margin-top:8px;color:var(--muted);font-size:13px;}

.domain-grid{display:flex;flex-direction:column;gap:12px;margin:22px 0;}
.domain-card{display:flex;gap:14px;align-items:flex-start;text-align:left;width:100%;border:2px solid var(--line);border-radius:16px;padding:16px 18px;background:var(--surface);cursor:pointer;font-family:var(--font-body);transition:background .12s ease, border-color .12s ease;}
.domain-card:hover{border-color:var(--turquoise);}
.domain-card.selected{border-color:var(--turquoise);background:var(--turquoise-soft);}
.domain-icon{width:28px;height:28px;color:var(--turquoise);flex-shrink:0;margin-top:2px;}
.domain-text{flex:1;}
.domain-text strong{display:block;font-size:16.5px;margin-bottom:2px;color:var(--ink);}
.domain-text span{font-size:14px;color:var(--muted);}
.domain-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;}
.domain-card.selected .domain-check{background:var(--lime);border-color:var(--lime);color:var(--ink);}
.domain-tag{display:inline-block;font-size:11px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.05em;color:var(--muted);background:var(--bg);border-radius:6px;padding:2px 7px;margin-top:5px;}

@media (prefers-reduced-motion: reduce){ .card,.btn,.domain-card{transition:none;} }

/* ---- rediseño: jerarquía + color funcional ---- */
.icon-badge{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;}
.icon-badge svg{width:58%;height:58%;}

.hero-cluster{display:flex;flex-wrap:wrap;gap:10px;margin:24px 0 6px;}
.hero-cluster .icon-badge{width:42px;height:42px;}

.section-head{display:flex;align-items:center;gap:10px;margin:0 0 14px;}
.section-head .head-bar{width:6px;height:24px;border-radius:3px;flex-shrink:0;}
.section-head h2{margin:0;}

.result-block{border-left:5px solid var(--line);padding:22px 22px 18px;margin-bottom:18px;background:var(--surface);border-radius:16px;box-shadow:0 1px 2px rgba(22,48,42,.05);}
.result-head{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.result-head-text{flex:1;min-width:0;}
.result-head-text h3{margin-bottom:2px;}
.score-ring{flex-shrink:0;}

.tool-list li{display:flex;gap:12px;align-items:flex-start;}
.tool-icon{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.tool-icon svg{width:13px;height:13px;}

.def-list li{padding-left:14px;border-left:3px solid var(--line);}

.note-box, .insight-box{display:flex;gap:14px;align-items:flex-start;}
.note-box p, .insight-box p{margin:0;}
.box-icon{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:17px;margin-top:1px;}

</style>
</head>
<body>
<div class="app-shell" id="app"></div>

<script>
/* ---------------- data: domains ---------------- */
const DOMAINS = {
  tea: {
    id:'tea', label:'Espectro autista (TEA)',
    short:'Comunicación social, rutinas, intereses intensos, enmascaramiento.',
    icon:'<circle cx="8" cy="12" r="4"/><circle cx="16" cy="12" r="4"/>',
    def:"El espectro autista es una condición del neurodesarrollo que afecta cómo una persona percibe, procesa y se comunica en el mundo social y sensorial. No siempre \"se nota\" desde afuera — muchas personas, especialmente mujeres y personas AFAB, desarrollan estrategias de enmascaramiento que ocultan estas diferencias durante años.",
    questions:[
      "¿Te cuesta identificar cuándo alguien está bromeando o siendo sarcástico si no te lo dicen directamente?",
      "¿Prefieres rutinas predecibles y te resulta muy incómodo cuando cambian sin aviso?",
      "¿Tienes uno o varios temas de interés muy intenso, sobre los que podrías hablar por horas?",
      "¿El contacto visual sostenido te resulta incómodo o cansador?",
      "¿Notas que \"actúas\" un personaje distinto en situaciones sociales para encajar, y que eso te agota?",
      "¿Te cuesta entender qué se espera de ti en conversaciones informales o \"small talk\"?",
      "¿Prefieres comunicación directa y literal, y te confunden las expresiones ambiguas o indirectas?",
      "De niña, ¿te decían que eras \"rara\", muy seria, o que te costaba hacer amigos, aunque lo intentaras?"
    ],
    maneuver:false,
    tools:[
      {t:"Comunicación explícita", d:"Pedir que te digan directamente lo que esperan, en vez de asumir que lo vas a intuir."},
      {t:"Aviso anticipado de cambios", d:"Pedir anticipación cuando algo va a cambiar en rutinas o planes."},
      {t:"Espacios de descompresión", d:"Bloques sin demanda social después de actividades que requieren mucho \"actuar\"."},
      {t:"Nombrar el enmascaramiento", d:"Notar cuánto esfuerzo pones en parecer \"normal\" es información útil, no un defecto."},
      {t:"Cuándo consultar", d:"Si esto interfiere en tu vida diaria, o quieres una evaluación formal con un especialista en neurodesarrollo adulto."}
    ]
  },
  tdah: {
    id:'tdah', label:'Déficit atencional (TDAH)',
    short:'Atención, organización, impulsividad, regulación del movimiento.',
    icon:'<path d="M13 3 L6 13 L11 13 L10 21 L18 10 L13 10 Z"/>',
    def:"El trastorno por déficit atencional, con o sin hiperactividad, es una condición del neurodesarrollo que afecta la regulación de la atención, los impulsos y la actividad. No es falta de voluntad ni de disciplina — es una diferencia real en cómo el cerebro regula estos procesos, y suele convivir con hiperfoco en cosas que sí interesan.",
    questions:[
      "¿Te cuesta mantener la atención en tareas que no te interesan, aunque sean importantes?",
      "¿Empiezas varias tareas o proyectos y te cuesta terminarlos?",
      "¿Pierdes u olvidas objetos cotidianos (llaves, teléfono, documentos) con frecuencia?",
      "¿Te cuesta organizar tareas que tienen varios pasos?",
      "¿Sientes inquietud interna o necesidad de moverte incluso en situaciones donde deberías estar quieta?",
      "¿Interrumpes conversaciones o completas frases de otras personas sin darte cuenta?",
      "¿Postergas tareas hasta el último momento aunque sepas que te va a costar más?",
      "¿Pierdes la noción del tiempo con facilidad (llegas tarde, o te \"enganchas\" en algo por horas sin notar)?"
    ],
    maneuver:false,
    tools:[
      {t:"Externalizar la memoria", d:"Listas, alarmas y recordatorios visibles, en vez de confiar en recordar."},
      {t:"Dividir tareas grandes", d:"Pasos pequeños con un punto de partida muy concreto y visible."},
      {t:"Aprovechar el hiperfoco", d:"Dirigirlo a tareas importantes cuando aparece, en vez de pelear contra él."},
      {t:"Permitir movimiento", d:"Pararte o caminar mientras trabajas, en vez de forzar quietud."},
      {t:"Cuándo consultar", d:"Si esto interfiere de forma significativa en tu funcionamiento, o quieres una evaluación formal."}
    ]
  },
  disautonomia: {
    id:'disautonomia', label:'Disautonomía / mareo al pararte',
    short:'Pulso, mareo o palpitaciones al cambiar de posición.',
    icon:'<path d="M3 18 L9 18 L12 6 L15 14 L17 10 L21 10"/>',
    def:"El sistema nervioso autónomo regula funciones automáticas como el ritmo cardíaco, la presión arterial y la temperatura. Cuando no se adapta bien a los cambios de posición aparecen síntomas como mareo o palpitaciones al ponerte de pie — a esto se le llama intolerancia ortostática.",
    questions:[
      "¿Sientes mareo o aturdimiento al ponerte de pie?",
      "¿Notas palpitaciones o que el corazón se acelera al pararte?",
      "¿Te sientes marcadamente más cansada después de estar de pie un rato?",
      "¿Se te nubla la mente o te cuesta pensar con claridad estando de pie?",
      "¿Te cuesta tolerar el calor o los ambientes calurosos?",
      "¿El ejercicio te deja agotada por más tiempo del que esperarías?",
      "¿Sientes necesidad de moverte o cambiar el peso de pierna para no desvanecerte al estar de pie?",
      "¿Tus síntomas mejoran claramente cuando te acuestas?"
    ],
    maneuver:true,
    tools:[
      {t:"Hidratación con sal", d:"Más agua y sodio pueden ayudar a expandir el volumen circulante.", c:"Consulta primero si tienes hipertensión, o enfermedad renal o cardíaca."},
      {t:"Medias de compresión", d:"Idealmente hasta la cintura — ayudan a que la sangre no se acumule en las piernas."},
      {t:"Cambios de posición lentos", d:"De acostada a sentada a de pie, con una pausa breve en cada paso."},
      {t:"Elevar la cabecera de la cama", d:"Unos 10 a 20 cm, para ayudar a la adaptación circulatoria nocturna."},
      {t:"Cuándo consultar", d:"Si los síntomas interfieren con tu día a día, si has tenido desmayos, o si notaste un aumento sostenido de pulso al pararte."}
    ]
  },
  hipermovilidad: {
    id:'hipermovilidad', label:'Hipermovilidad articular',
    short:'Articulaciones flexibles, esguinces o luxaciones frecuentes.',
    icon:'<circle cx="6" cy="7" r="2"/><path d="M6 9 C 6 15, 14 9, 16 15"/><circle cx="18" cy="17" r="2"/>',
    def:"La hipermovilidad articular ocurre cuando las articulaciones se mueven más allá del rango considerado habitual, a veces por diferencias en el tejido conectivo. Puede ser solo una característica física, o venir acompañada de dolor, inestabilidad articular y síntomas autonómicos asociados.",
    questions:[
      "¿Puedes (o podías) doblar el pulgar hacia atrás hasta tocar el antebrazo?",
      "¿Puedes (o podías) apoyar las palmas en el piso con las rodillas estiradas, sin esfuerzo?",
      "De niña o adolescente, ¿sorprendías a otros por lo flexible que eras (contorsiones, splits)?",
      "¿Se te ha salido de lugar o dislocado un hombro o la rótula más de una vez?",
      "¿Te consideras \"doble articulada\" o notoriamente más flexible que el promedio?",
      "¿Tienes dolores articulares frecuentes sin una lesión clara que los explique?",
      "¿Tu piel es inusualmente elástica o se estira más de lo esperable?",
      "¿Se te tuerce o \"se te sale\" el tobillo con facilidad al caminar en superficies irregulares?"
    ],
    maneuver:false,
    tools:[
      {t:"Fortalecimiento de baja carga", d:"Trabajar la musculatura alrededor de las articulaciones ayuda a darles más estabilidad."},
      {t:"Evitar hiperextender activamente", d:"Mantener una leve flexión al estar de pie o cargar peso, en vez de \"trabar\" la articulación al extremo."},
      {t:"Calzado con buen soporte", d:"Reduce la carga sobre tobillos y rodillas en superficies irregulares."},
      {t:"Pausas de movimiento", d:"Cambiar de postura cada cierto tiempo en vez de mantener una posición fija por horas."},
      {t:"Cuándo consultar", d:"Dolor articular persistente, subluxaciones frecuentes, o para evaluar el eje hipermovilidad–disautonomía–dolor en conjunto."}
    ]
  },
  dolor: {
    id:'dolor', label:'Dolor crónico y sensibilización',
    short:'Dolor persistente o hipersensibilidad al tacto y la presión.',
    icon:'<circle cx="12" cy="12" r="2.3"/><path d="M12 3 L12 6 M12 18 L12 21 M3 12 L6 12 M18 12 L21 12 M5.8 5.8 L7.6 7.6 M16.4 16.4 L18.2 18.2 M18.2 5.8 L16.4 7.6 M7.6 16.4 L5.8 18.2"/>',
    def:"La sensibilización central ocurre cuando el sistema nervioso amplifica señales de dolor más allá de lo que explicaría el estímulo original. El dolor se vuelve real y persistente, aunque los exámenes no siempre muestren una causa estructural clara.",
    questions:[
      "¿Tienes dolor en más de una zona del cuerpo desde hace más de 3 meses?",
      "¿Sientes dolor con estímulos que antes no dolían (roce, presión leve, etiquetas de ropa)?",
      "¿El dolor varía en intensidad sin relación clara con actividad física o lesión?",
      "¿El cansancio empeora notoriamente después de un episodio de dolor?",
      "¿El dolor afecta tu sueño de forma frecuente?",
      "¿Sientes rigidez o \"niebla mental\" junto con el dolor?",
      "¿El dolor se agrava con estrés emocional o sobrecarga sensorial?",
      "¿Has sentido que profesionales de salud minimizan tu dolor o no encuentran una causa clara?"
    ],
    maneuver:false,
    tools:[
      {t:"Ritmo de actividad (pacing)", d:"Dividir tareas en bloques más cortos para evitar el ciclo de sobre-esfuerzo y colapso posterior."},
      {t:"Reducir carga sensorial junto con la física", d:"El dolor y la sobrecarga sensorial suelen retroalimentarse — bajar ambas a la vez ayuda más que solo una."},
      {t:"Calor local", d:"Puede aliviar dolor musculoesquelético de forma simple y segura para la mayoría de las personas."},
      {t:"Higiene de sueño", d:"El dolor y el sueño se afectan mutuamente en ambas direcciones."},
      {t:"Cuándo consultar", d:"Dolor que limita tu funcionamiento diario, que cambia de patrón, o que nunca ha sido evaluado en conjunto."}
    ]
  },
  sensorial: {
    id:'sensorial', label:'Sensorialidad y migraña',
    short:'Sensibilidad a luz, sonido o texturas; dolores de cabeza recurrentes.',
    icon:'<path d="M4 16 a8 8 0 0 1 16 0"/><path d="M8 16 a4 4 0 0 1 8 0"/><circle cx="12" cy="16" r="1.3" fill="currentColor" stroke="none"/>',
    def:"La sensibilidad sensorial y la migraña comparten mecanismos de hiperexcitabilidad neurológica: el sistema nervioso reacciona con más intensidad de la esperada ante luz, sonido, ciertos alimentos u otros estímulos.",
    questions:[
      "¿Las luces brillantes o parpadeantes te resultan difíciles de tolerar?",
      "¿Ciertos sonidos, aunque no sean fuertes para otras personas, te resultan insoportables?",
      "¿Ciertas texturas de ropa, comida o superficies te generan rechazo intenso?",
      "¿Tienes dolores de cabeza recurrentes, no solo ocasionales?",
      "Durante esos dolores de cabeza, ¿la luz o el sonido te molestan más de lo habitual?",
      "¿Esos dolores de cabeza vienen acompañados de náuseas o malestar digestivo?",
      "¿Notas síntomas visuales (destellos, puntos, visión borrosa) antes o durante el dolor de cabeza?",
      "¿La sobrecarga sensorial (ruido, luces, gente, olores) te deja agotada por horas o días?"
    ],
    maneuver:false,
    tools:[
      {t:"Diario de gatillantes", d:"Anotar luz, sonido, alimentos y sueño alrededor de cada episodio ayuda a ver patrones."},
      {t:"Pausas sensoriales programadas", d:"Bloques breves y regulares en un ambiente con poca luz y poco ruido, antes de llegar al límite."},
      {t:"Filtros de luz o audífonos con cancelación de ruido", d:"Herramientas simples para bajar la carga sensorial en ambientes que no puedes controlar."},
      {t:"Hidratación y horarios regulares de comida", d:"Gatillante frecuente y modificable en migraña."},
      {t:"Cuándo consultar", d:"Dolores de cabeza que cambian de patrón, aumentan en frecuencia, o interfieren con tu funcionamiento."}
    ]
  },
  digestivo: {
    id:'digestivo', label:'Digestivo / MCAS',
    short:'Síntomas digestivos o reacciones alérgicas inusuales.',
    icon:'<path d="M4 6 C 4 6, 20 6, 20 10 C 20 14, 6 12, 6 16 C 6 19, 16 18, 18 20"/>',
    exploratory:true,
    def:"El síndrome de activación mastocitaria (MCAS) ocurre cuando ciertas células del sistema inmune liberan mediadores de forma excesiva o inapropiada, generando síntomas digestivos, alérgicos o de piel variables. Es un diagnóstico complejo y aún debatido, que requiere evaluación especializada.",

async function sendToSheet(tipo, correo, whatsapp){
  if(!CONFIG.SHEET_WEBHOOK_URL) return false;

/* ---------------- state ---------------- */
const STATE = {
  screen:'landing', selectedDomains:[], domainPointer:0, qIndex:0, answers:{},
  baseline:null, checkpoints:{1:null,3:null,5:null,10:null},
  maniobraSkipped:false, maniobraAbortedEarly:false,

  timerId:null
};

function $(id){ return document.getElementById(id); }
function esc(str){ const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }
function clearActiveTimer(){ if(STATE.timerId){ clearInterval(STATE.timerId); STATE.timerId=null; } }
function goTo(screen){ clearActiveTimer(); STATE.screen=screen; render(); window.scrollTo({top:0,behavior:'auto'}); }
function orderedSelected(){ return DOMAIN_ORDER.filter(id=>STATE.selectedDomains.includes(id)).map(id=>DOMAINS[id]); }
function currentDomain(){ return orderedSelected()[STATE.domainPointer]; }

/* ---------------- progress / horizon ---------------- */
function toneForScreen(screen){
  const alertScreens=['maniobra-safety','maniobra-stand-ready','maniobra-wait-1','maniobra-input-1','maniobra-wait-3','maniobra-input-3','maniobra-wait-5','maniobra-input-5','maniobra-wait-10','maniobra-input-10'];
  return alertScreens.includes(screen) ? 'alert' : 'calm';
}
function overallProgress(){
  if(STATE.screen==='landing' || STATE.screen==='domain-select') return 0;
  if(STATE.screen==='results') return 1;
  const list=orderedSelected(); const total=list.length||1;
  let within=0.5;
  if(STATE.screen==='q'){ const d=currentDomain(); within = d ? STATE.qIndex/d.questions.length : 0; }
  else if(STATE.screen.startsWith('maniobra') || STATE.screen==='interim'){ within=0.85; }
  else if(STATE.screen==='domain-transition'){ within=1; }
  return (STATE.domainPointer+within)/total;
}
function renderHorizon(){
  const progress=overallProgress(); const tone=toneForScreen(STATE.screen);
  const pct=Math.round(Math.min(Math.max(progress,0),1)*100);
  return `
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill${tone==='alert'?' alert':''}" style="width:${pct}%"></div></div>
    <div class="progress-labels"><span>Inicio</span><span>Resultados</span></div>
  </div>`;
}

/* ---------------- shared bits ---------------- */
function eyebrow(text){
  const tone=toneForScreen(STATE.screen);
  const bg = tone==='alert' ? 'var(--alert)' : 'var(--turquoise)';
  return `<span class="eyebrow-pill" style="background:${bg};">${text}</span>`;
}
function persistentSafety(){ return `<div class="persistent-safety">⚠ Si sientes mucho mareo o sensación de desmayo, detente y siéntate o acuéstate ahora.</div>`; }
function dots(total,current){
  let html='<div class="dots">';
  for(let i=0;i<total;i++){ let cls='dot'; if(i<current) cls+=' filled'; if(i===current) cls+=' current'; html+=`<span class="${cls}"></span>`; }
  return html+'</div>';
}

/* ---------------- color por dominio + helpers visuales ---------------- */
const PALETTE = ['#12A19E', '#AFC62A'];
function domainColor(domain){ return PALETTE[DOMAIN_ORDER.indexOf(domain.id) % 2]; }
function domainColorSoft(domain){ return DOMAIN_ORDER.indexOf(domain.id) % 2 === 0 ? 'var(--turquoise-soft)' : 'var(--lime-soft)'; }
function iconBadge(domain, size){
  size = size || 44;
  const color = domainColor(domain); const soft = domainColorSoft(domain);
  return `<span class="icon-badge" style="width:${size}px;height:${size}px;background:${soft};color:${color};">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${domain.icon}</svg>
  </span>`;
}
function scoreRing(score,total,color){
  const r=22, c=2*Math.PI*r; const pct = total ? score/total : 0; const dash = c*pct;
  return `
  <svg width="56" height="56" viewBox="0 0 56 56" class="score-ring" aria-hidden="true">
    <circle cx="28" cy="28" r="${r}" fill="none" stroke="var(--line)" stroke-width="6"/>
    <circle cx="28" cy="28" r="${r}" fill="none" stroke="${color}" stroke-width="6" stroke-linecap="round" stroke-dasharray="${dash} ${c}" transform="rotate(-90 28 28)"/>
    <text x="28" y="33" text-anchor="middle" style="font-family:var(--font-mono);font-size:13px;font-weight:700;fill:var(--ink);">${score}/${total}</text>
  </svg>`;
}
function sectionHead(text,color){
  return `<div class="section-head"><span class="head-bar" style="background:${color||'var(--turquoise)'};"></span><h2>${text}</h2></div>`;
}

/* ---------------- timers ---------------- */
function startCountdown(totalSeconds,onDone){
  clearActiveTimer(); let remaining=totalSeconds; updateTimerText(remaining);
  STATE.timerId=setInterval(()=>{ remaining--; updateTimerText(remaining); if(remaining<=0){ clearActiveTimer(); onDone(); } },1000);
}
function updateTimerText(seconds){
  const el=$('timer-display'); if(!el) return;
  const m=Math.floor(seconds/60).toString().padStart(2,'0'); const s=(seconds%60).toString().padStart(2,'0');
  el.textContent=`${m}:${s}`;
}

/* ---------------- results ---------------- */
function computeDeltas(){
  if(STATE.baseline==null) return null;
  const threshold=30; const minutes=[1,3,5,10];
  const rows=minutes.map(m=>{ const v=STATE.checkpoints[m]; return {minute:m,pulse:v,delta:v!=null?(v-STATE.baseline):null}; });
  const validDeltas=rows.filter(r=>r.delta!=null); const highCount=validDeltas.filter(r=>r.delta>=threshold).length;
  return {threshold,rows,highCount,anyData:validDeltas.length>0};
}
function domainScore(domain){
  const arr=STATE.answers[domain.id]||[]; const score=arr.filter(Boolean).length;
  return {score,total:domain.questions.length, high:(score/domain.questions.length)>=0.5};
}
function toolListHtml(tools,domain){
  const color=domainColor(domain); const soft=domainColorSoft(domain);
  return `<ul class="tool-list">${tools.map(t=>`<li><span class="tool-icon" style="background:${soft};color:${color};"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4L19 6"/></svg></span><span><strong>${esc(t.t)}</strong>${esc(t.d)}${t.c?`<span class="caveat">${esc(t.c)}</span>`:''}</span></li>`).join('')}</ul>`;
}
function domainResultBlock(domain){
  const {score,total,high}=domainScore(domain);
  let extra='';
  if(domain.id==='disautonomia' && !STATE.maniobraSkipped){
    const d=computeDeltas();
    if(d && d.anyData){
      const rowsHtml=d.rows.map(r=>{
        const pulseTxt=r.pulse!=null?r.pulse:'—'; const deltaTxt=r.delta!=null?(r.delta>=0?'+':'')+r.delta:'—';
        const flagCls=(r.delta!=null && r.delta>=d.threshold)?'flag-high':'';
        return `<tr><td>min ${r.minute}</td><td>${pulseTxt}</td><td class="${flagCls}">${deltaTxt} lpm</td></tr>`;
      }).join('');
      const flagged=d.highCount>=2;
      extra=`
        <p>Pulso en reposo: <strong>${STATE.baseline} lpm</strong> · umbral de referencia: <strong>≥${d.threshold} lpm</strong> sostenido</p>
        <table><thead><tr><th>Momento</th><th>Pulso</th><th>Δ vs reposo</th></tr></thead><tbody>${rowsHtml}</tbody></table>
        <p>${flagged
          ? 'Tus datos muestran un aumento de pulso sostenido, en al menos dos mediciones, por sobre el umbral de referencia. Esto es compatible con un patrón de intolerancia ortostática (por ejemplo, el que se describe en POTS). <strong>Es una sospecha, no un diagnóstico.</strong>'
          : 'Tus datos no muestran, por sí solos, el patrón de aumento sostenido de pulso característico de POTS. Esto no descarta otras formas de intolerancia ortostática — la hipotensión ortostática, por ejemplo, requiere medir presión arterial, que esta app no mide.'}</p>
        ${STATE.maniobraAbortedEarly ? `<p class="muted">Detuviste la maniobra antes de terminar — hiciste bien en priorizar cómo te sentías. Los datos de arriba son parciales.</p>`:''}
      `;
    } else if(STATE.maniobraAbortedEarly){
      extra=`<p class="muted">Detuviste la maniobra antes de registrar datos — hiciste bien en priorizar cómo te sentías.</p>`;
    }
  }
  return `
    <div class="result-block" style="border-left-color:${domainColor(domain)};">
      <div class="result-head">
        ${iconBadge(domain,44)}
        <div class="result-head-text">
          <h3>${esc(domain.label)}${domain.exploratory?' <span class="domain-tag">exploratorio</span>':''}</h3>
          <p class="muted" style="margin:0;">${high ? 'Un número a tener en cuenta.' : 'Menos síntomas marcados en este eje.'}</p>
        </div>
        ${scoreRing(score,total,domainColor(domain))}
      </div>
      ${extra}
      ${toolListHtml(domain.tools,domain)}
    </div>
  `;
}
function glossarySection(){
  const list=orderedSelected();
  const items=list.map(d=>`<li style="border-left-color:${domainColor(d)};"><strong>${esc(d.label)}</strong><span class="muted">${esc(d.def)}</span></li>`).join('');
  return `${sectionHead('¿Qué significa cada eje?')}<ul class="def-list">${items}</ul>`;
}

function screenResults(){
  const list=orderedSelected();
  const blocks=list.map(d=>domainResultBlock(d)).join('');
  const highCount=list.filter(d=>domainScore(d).high).length;

  let insight='';

  }

  return `
    ${renderHorizon()}
    <div class="card">
      ${eyebrow('Tus resultados')}
      ${sectionHead('Esto es lo que marcaste')}
      <div class="note-box"><div class="box-icon" style="background:var(--turquoise);color:#fff;">i</div><p><strong>Cómo leer esto:</strong> estos síntomas pesan más como señal cuando no tienen ya una causa médica identificada, y cuando aparecen junto con síntomas de otros ejes. Si un síntoma puntual ya tiene una causa conocida (por ejemplo, anemia explicando el cansancio), pesa menos aquí. Lo que vale la pena mirar es el patrón sin explicación clara que se repite entre ejes.</p></div>
      ${insight}
      ${blocks}
      ${glossarySection()}

      <div class="disclaimer">
        Este cribado es de orientación, no reemplaza evaluación médica. No indica iniciar ni suspender medicamentos. Las cantidades de sal deben conversarse con tu médico. El eje digestivo/MCAS es el más exploratorio de los siete.
      </div>

      ${sectionHead('Antes de irte','var(--lime)')}
      <p class="muted">Recibe estos resultados en tu correo, para conversarlos con tu médico. Si quieres, deja también tu WhatsApp (opcional) para avisarte cuando publiquemos clases a bajo costo sobre estos temas.</p>
      ${STATE.contactSubmitted ? `
        <div class="confirm-box">
          ¡Gracias! Guardamos <strong>${esc(STATE.email)}</strong>${STATE.phone ? ` y tu WhatsApp <strong>${esc(STATE.phone)}</strong>` : ''}.
          <span class="fineprint">${CONFIG.SHEET_WEBHOOK_URL ? 'Intentamos guardar tus datos en la planilla. Por las políticas de seguridad del navegador no podemos confirmar el resultado desde aquí — revisa tu Google Sheet para verificar que llegó.' : 'Nota: esta es una versión de demostración — falta pegar la URL del Apps Script en CONFIG.SHEET_WEBHOOK_URL para que esto se guarde de verdad.'}</span>
        </div>
      ` : `
        <label for="email-input">Tu correo</label>
        <input type="email" id="email-input" placeholder="tu@correo.cl">
        <label for="phone-input" style="margin-top:16px;">Tu WhatsApp (opcional)</label>
        <input type="tel" id="phone-input" placeholder="+56 9 1234 5678">
        <div class="stack"><button class="btn btn-primary" onclick="submitContact()">Enviarme mis resultados</button></div>
      `}

      <div style="text-align:center;margin-top:26px;">
        <button class="btn btn-ghost" onclick="resetApp()">Volver a empezar</button>
      </div>
    </div>
    <p class="footer-note">Herramienta educativa, no diagnóstica · Proyecto Neurodivergencia</p>
  `;
}

/* ---------------- actions ---------------- */
function toggleDomain(id){
  const idx=STATE.selectedDomains.indexOf(id);
  if(idx>=0) STATE.selectedDomains.splice(idx,1); else STATE.selectedDomains.push(id);
  render();
}
function toggleAllDomains(){
  const allSelected=DOMAIN_ORDER.every(id=>STATE.selectedDomains.includes(id));
  STATE.selectedDomains = allSelected ? [] : [...DOMAIN_ORDER];
  render();
}
function startScreening(){
  if(STATE.selectedDomains.length===0){ alert('Elige al menos un eje para continuar.'); return; }
  STATE.domainPointer=0; STATE.qIndex=0; goTo('q');
}
function answerQuestion(val){
  const d=currentDomain();
  if(!STATE.answers[d.id]) STATE.answers[d.id]=[];
  STATE.answers[d.id][STATE.qIndex]=val;
  if(STATE.qIndex < d.questions.length-1){ STATE.qIndex++; render(); }
  else { finishDomainQuestions(d); }
}
function prevQuestion(){ if(STATE.qIndex>0){ STATE.qIndex--; render(); } }
function finishDomainQuestions(domain){ if(domain.maneuver){ goTo('interim'); } else { goTo('domain-transition'); } }
function initBaselineWait(){ startCountdown(300, ()=>goTo('maniobra-baseline-input')); }
function submitBaseline(){
  const v=parseInt($('baseline-input').value,10);
  if(!v||v<30||v>200){ alert('Ingresa un pulso válido (entre 30 y 200).'); return; }
  STATE.baseline=v; goTo('maniobra-stand-ready');
}
function submitCheckpoint(minute){
  const v=parseInt($('cp-input').value,10);
  if(!v||v<30||v>220){ alert('Ingresa un pulso válido (entre 30 y 220).'); return; }
  STATE.checkpoints[minute]=v;
  if(minute===1) goTo('maniobra-wait-3');
  else if(minute===3) goTo('maniobra-wait-5');
  else if(minute===5) goTo('maniobra-wait-10');
  else { goTo('domain-transition'); }
}
function stopManiobra(){ STATE.maniobraAbortedEarly=true; goTo('domain-transition'); }
function skipManiobra(){ STATE.maniobraSkipped=true; goTo('domain-transition'); }
function advanceDomain(){
  STATE.domainPointer++;
  const list=orderedSelected();
  if(STATE.domainPointer>=list.length){ goTo('results'); } else { STATE.qIndex=0; goTo('q'); }
}
function submitContact(){
  const emailEl=$('email-input'); const phoneEl=$('phone-input');
  const emailVal=emailEl.value.trim();
  const phoneVal=phoneEl ? phoneEl.value.trim() : '';
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)){ alert('Ingresa un correo válido.'); return; }
  if(phoneVal){
    const digits=phoneVal.replace(/\D/g,'');
    if(digits.length<8){ alert('Ese WhatsApp no se ve válido — puedes dejarlo vacío si prefieres.'); return; }
  }
  STATE.email=emailVal; STATE.phone=phoneVal; STATE.contactSubmitted=true; render();
  sendToSheet('contacto', emailVal, phoneVal);
}
function resetApp(){
  STATE.screen='landing'; STATE.selectedDomains=[]; STATE.domainPointer=0; STATE.qIndex=0;
  STATE.answers={}; STATE.baseline=null;
  STATE.checkpoints={1:null,3:null,5:null,10:null};
  STATE.maniobraSkipped=false; STATE.maniobraAbortedEarly=false;
  STATE.email=''; STATE.phone=''; STATE.contactSubmitted=false;
  goTo('landing');
}

/* ---------------- render ---------------- */
function render(){
  let html='';
  switch(STATE.screen){
    case 'landing': html=screenLanding(); break;
    case 'domain-select': html=screenDomainSelect(); break;
    case 'q': html=screenQuestion(); break;
    case 'interim': html=screenInterim(); break;
    case 'maniobra-safety': html=screenManiobraSafety(); break;
    case 'maniobra-baseline-wait': html=screenBaselineWait(); break;
    case 'maniobra-baseline-input': html=screenBaselineInput(); break;
    case 'maniobra-stand-ready': html=screenStandReady(); break;
    case 'maniobra-wait-1': html=checkpointWaitScreen(1,'maniobra-input-1',0); break;
    case 'maniobra-input-1': html=checkpointInputScreen(1,0); break;
    case 'maniobra-wait-3': html=checkpointWaitScreen(3,'maniobra-input-3',1); break;
    case 'maniobra-input-3': html=checkpointInputScreen(3,1); break;
    case 'maniobra-wait-5': html=checkpointWaitScreen(5,'maniobra-input-5',2); break;
    case 'maniobra-input-5': html=checkpointInputScreen(5,2); break;
    case 'maniobra-wait-10': html=checkpointWaitScreen(10,'maniobra-input-10',3); break;
    case 'maniobra-input-10': html=checkpointInputScreen(10,3); break;
    case 'domain-transition': html=screenDomainTransition(); break;
    case 'results': html=screenResults(); break;
    default: html=screenLanding();
  }
  $('app').innerHTML=html;
  if(STATE.screen==='maniobra-baseline-wait') initBaselineWait();
  if(STATE.screen==='maniobra-wait-1') startCountdown(60, ()=>goTo('maniobra-input-1'));
  if(STATE.screen==='maniobra-wait-3') startCountdown(120, ()=>goTo('maniobra-input-3'));
  if(STATE.screen==='maniobra-wait-5') startCountdown(120, ()=>goTo('maniobra-input-5'));
  if(STATE.screen==='maniobra-wait-10') startCountdown(300, ()=>goTo('maniobra-input-10'));
}

render();
</script>
</body>
</html>
